name: AetherEMS CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: aetherems-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  downstream-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install pinned Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.90.0
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check repository boundary
        run: ./scripts/check-repository-boundary.sh

      - name: Lint downstream composition
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

      - name: Test Energy Pack and composition
        run: cargo test --workspace --all-targets --locked

      - name: Run fail-safe composition
        run: cargo run --locked -p aetherems-composition

  load-forecasting-processor:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: processors/load-forecasting
    steps:
      - uses: actions/checkout@v4

      - name: Install uv and Python
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.28"
          python-version: "3.12"
          enable-cache: true

      - name: Install locked processor dependencies
        run: uv sync --locked --all-groups

      - name: Lint processor
        run: |
          uv run ruff format --check .
          uv run ruff check .

      - name: Test processor
        run: uv run pytest
